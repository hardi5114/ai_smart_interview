<button onclick="start()">Start Camera</button>
<video id="v" autoplay></video>

<script>
    async function start() {
        try {
            let stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById("v").srcObject = stream;
        } catch (e) {
            alert(e.name);
            console.log(e);
        }
    }
</script>

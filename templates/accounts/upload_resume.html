{% extends "base.html" %}

{% block content %}

<style>
    body {
        background: url("/static/images/background2.jpg") no-repeat center/cover;
        font-family: 'Segoe UI', sans-serif;
    }

    .glow-text {
        color: white;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
    }

    .upload-card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(15px);
        border-radius: 15px;
        padding: 20px;
        border: 1px solid rgba(0, 255, 255, 0.2);
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        color: white;
        margin-bottom: 30px;
    }

    .form-control {
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .form-control::file-selector-button {
        background: #0e88aa;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 5px;
    }

    .btn-upload {
        background: linear-gradient(45deg, #010202, #114d99);
        border: none;
        color: white;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-upload:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
    }

    .info-box {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 15px;
        color: white;
        text-align: center;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        margin-top: 15px;
    }

    .btn-back {
        border: 1px solid #00eaff;
        color: white;
    }

    .btn-back:hover {
        background: #00eaff;
        color: black;
    }

    /* Resume Data Display */
    .resume-data-card {
        background: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
        padding: 20px;
        margin-top: 20px;
        color: #fff;
        border: 1px solid rgba(0, 255, 255, 0.3);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    .resume-data-card h5 {
        margin-bottom: 10px;
        text-decoration: underline;
        color: #00eaff;
    }

    .resume-data-card p {
        margin-bottom: 5px;
    }
</style>

<div class="container mt-5 pt-5">

    <div class="mb-3">
        <a href="{% url 'accounts:dashboard' %}" class="btn btn-back btn-sm">⬅ Back to Dashboard</a>
    </div>

    {% if message %}
    <div class="row justify-content-center mt-3">
        <div class="col-md-6">
            <div class="alert alert-info text-center">
                {{ message }}
            </div>
        </div>
    </div>
    {% endif %}


    <h2 class="mb-4 text-center glow-text">📄 Upload Your Resume</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- Upload Card -->
            <div class="upload-card">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label glow-text">Select Resume</label>
                        <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx" required>
                    </div>

                    <button type="submit" class="btn btn-upload w-100">
                        🚀 Upload Resume
                    </button>

                    <div class="mt-3 info-box">
                        <p class="small mb-1 glow-text">Supported Formats</p>
                        <p class="mb-1">📄 PDF &nbsp;&nbsp; 📘 DOC / DOCX</p>
                        <small>(Max size: 2MB)</small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
